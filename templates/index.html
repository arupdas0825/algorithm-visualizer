<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Interactive Algorithm Visualizer — watch sorting and pathfinding algorithms come to life step by step." />
    <title>Algorithm Visualizer</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <!-- ───────── Header ───────── -->
    <header id="app-header">
        <div class="header-brand">
            <span class="logo-icon">⚡</span>
            <h1>Algorithm Visualizer</h1>
        </div>
        <nav class="mode-tabs" id="mode-tabs">
            <button class="tab active" data-mode="sort">Sorting</button>
            <button class="tab" data-mode="pathfind">Pathfinding</button>
        </nav>
    </header>

    <!-- ───────── Main Layout ───────── -->
    <main id="app-main">
        <!-- Sidebar -->
        <aside id="sidebar">
            <!-- Controls section (populated by controls.js) -->
            <div id="controls-panel"></div>
            <!-- Algorithm info (populated by algorithmInfo.js) -->
            <div id="info-panel"></div>
        </aside>

        <!-- Canvas Area -->
        <section id="canvas-area">
            <!-- Sorting view -->
            <div id="sort-view" class="view active">
                <div id="array-container"></div>
            </div>
            <!-- Pathfinding view -->
            <div id="pathfind-view" class="view">
                <div id="grid-container"></div>
                <p class="grid-hint">Click to toggle walls &bull; Drag <span class="start-marker">S</span> or <span
                        class="end-marker">E</span> to move</p>
            </div>
            <!-- Status bar -->
            <div id="status-bar">
                <span id="status-text">Ready</span>
                <span id="step-counter">Step 0 / 0</span>
            </div>
        </section>
    </main>

    <!-- Scripts (order matters: components first) -->
    <script src="/static/components/algorithmInfo.js"></script>
    <script src="/static/components/arrayVisualizer.js"></script>
    <script src="/static/components/controls.js"></script>
    <script src="/static/script.js"></script>
</body>

</html>
